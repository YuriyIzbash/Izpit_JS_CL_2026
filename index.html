<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Smith</title>
    <link rel="stylesheet" href="style/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300,400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- NAV BAR -->
    <header class="nav">
        <div class="nav__logo">
            <img src="assets/logo.svg" alt="JS Logo" />
        </div>
        <nav class="nav__links">
            <a href="#">about</a>
            <a href="#">experience</a>
            <a href="#">skill</a>
            <a href="#">portfolio</a>
            <a href="#">contact</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero__content">
            <div class="hero__avatar"></div>
            <div class="hero__text">
                <h1 class="hero__name">John <span class="accent">Smith</span></h1>
                <p class="hero__tagline">I design and build things on the internet.</p>
            </div>
        </div>
        <div class="hero__arrow">
            <img src="assets/hero-arrow.svg" alt="scroll down" />
        </div>
    </section>

    <!-- CONTACT -->
    <section class="contact">
        <div class="contact__inner">
            <h2 class="contact__title">Contact</h2>
            <p class="contact__text">
                I am currently seeking employment, so if you have a job or<br />
                project offer, or if you need more information, please do<br />
                not hesitate to contact me.
            </p>
            <a href="#" class="contact__btn">Write Message</a>
            <div class="contact__socials">
                <a href="#"><img src="assets/github-icon.svg" alt="GitHub" /></a>
                <a href="#"><img src="assets/linkedin-icon.svg" alt="LinkedIn" /></a>
                <a href="#"><img src="assets/instagram-icon.svg" alt="Instagram" /></a>
                <a href="#"><img src="assets/twitter-icon.svg" alt="Twitter" /></a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>John <span class="accent">Smith</span> - 2023</p>
    </footer>

</body>
</html>
